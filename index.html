<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1DB954">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>LP Player</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #121212;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 2rem;
      width: min(90vw, 400px);
      text-align: center;
    }
    .card h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .card p { color: #b3b3b3; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .card input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #282828;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    .card button, .btn {
      width: 100%;
      padding: 14px;
      border-radius: 24px;
      border: none;
      background: #1DB954;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .card button:active, .btn:active { opacity: 0.8; }
    .camera-screen {
      text-align: center;
      width: min(90vw, 400px);
    }
    .camera-screen h1 {
      font-size: 1.5rem;
      margin-bottom: 2rem;
    }
    .capture-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 3rem 2rem;
      border: 2px dashed #333;
      border-radius: 16px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .capture-btn:active { border-color: #1DB954; }
    .capture-btn span { font-size: 1rem; color: #b3b3b3; }
    .status {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #b3b3b3;
      min-height: 1.5rem;
    }
    .result { margin-top: 1rem; }
    .album-card {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: left;
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .album-card img {
      width: 80px;
      height: 80px;
      border-radius: 8px;
    }
    .album-card .info h2 { font-size: 1rem; }
    .album-card .info p { font-size: 0.85rem; color: #b3b3b3; }
    .playing { color: #1DB954; font-size: 0.85rem; margin-top: 0.5rem; }
    .error { color: #e74c3c; }
    .tracklist {
      list-style: none;
      margin-top: 1rem;
      background: #1e1e1e;
      border-radius: 12px;
      overflow: hidden;
    }
    .track {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .track:active { background: #282828; }
    .track.active { color: #1DB954; }
    .track.active .track-nr { color: #1DB954; }
    .track-nr {
      width: 24px;
      text-align: right;
      font-size: 0.85rem;
      color: #b3b3b3;
      flex-shrink: 0;
    }
    .track-name {
      flex: 1;
      font-size: 0.95rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .track-dur {
      font-size: 0.8rem;
      color: #b3b3b3;
      flex-shrink: 0;
    }
    .settings-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: #282828;
      color: #b3b3b3;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .settings-btn:active { background: #333; }
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: #121212;
      z-index: 20;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .settings-card {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 1.5rem;
      width: min(90vw, 400px);
      margin-bottom: 1rem;
    }
    .settings-card h2 {
      font-size: 1rem;
      margin-bottom: 1rem;
      color: #b3b3b3;
    }
    .settings-card select,
    .settings-card input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #282828;
      color: #fff;
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }
    .settings-card .btn-sm {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-green { background: #1DB954; color: #fff; }
    .btn-red { background: #e74c3c; color: #fff; }
    .btn-gray { background: #333; color: #fff; }
    .btn-sm:active { opacity: 0.8; }
    .device-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .device-item:active { background: #282828; }
    .device-item.selected { color: #1DB954; }
    .device-item .device-name { font-size: 0.9rem; }
    .device-item .device-type { font-size: 0.75rem; color: #b3b3b3; }
    .play-pause {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: #1DB954;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .play-pause:active { opacity: 0.8; }
    .scan-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      margin-bottom: 1rem;
      border: 1px solid #333;
      border-radius: 24px;
      color: #b3b3b3;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .scan-btn:active { border-color: #1DB954; color: #fff; }
  </style>
</head>
<body>
  <main id="app"></main>

  <script>
    const SPOTIFY_CLIENT_ID = "b5fe2dcf3e4b42d59f1123b54461c670";
    const SPOTIFY_REDIRECT_URI = location.origin + location.pathname;
    const SPOTIFY_SCOPES = "user-modify-playback-state user-read-playback-state";
    const DEFAULT_MODEL = "claude-sonnet-4-6";

    function getModel() {
      return localStorage.getItem("anthropic_model") || DEFAULT_MODEL;
    }

    const app = document.getElementById("app");

    function escapeHtml(str) {
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // ── State Router ─────────────────────────────────────────────────────────

    function getState() {
      if (!localStorage.getItem("anthropic_key") || !localStorage.getItem("anthropic_model")) return "setup";
      if (!localStorage.getItem("spotify_access_token")) return "login";
      return "camera";
    }

    function render() {
      const state = getState();
      if (state === "setup") renderSetup();
      else if (state === "login") renderLogin();
      else renderCamera();
    }

    // ── Setup Screen ─────────────────────────────────────────────────────────

    function renderSetup() {
      const savedKey = localStorage.getItem("anthropic_key") || "";
      app.innerHTML = `
        <div class="card">
          <h1>LP Player</h1>
          <p>Voer je Anthropic API key in. Je key wordt lokaal opgeslagen en alleen naar api.anthropic.com gestuurd.</p>
          <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off" value="${escapeHtml(savedKey)}">
          <div id="model-section" style="display:none; margin-bottom:1rem;">
            <label style="display:block; color:#b3b3b3; font-size:0.85rem; margin-bottom:0.5rem; text-align:left;">Model</label>
            <select id="model-select" style="width:100%; padding:12px; border-radius:8px; border:1px solid #333; background:#282828; color:#fff; font-size:0.9rem;"></select>
          </div>
          <button id="save-key">Volgende</button>
        </div>
      `;
      document.getElementById("save-key").onclick = async () => {
        const key = document.getElementById("api-key").value.trim();
        if (!key.startsWith("sk-ant-")) return alert("Ongeldige key");
        localStorage.setItem("anthropic_key", key);

        const select = document.getElementById("model-select");
        if (select.options.length > 0) {
          localStorage.setItem("anthropic_model", select.value);
          render();
          return;
        }

        const btn = document.getElementById("save-key");
        btn.textContent = "Modellen ophalen...";
        btn.disabled = true;

        try {
          const resp = await fetch("https://api.anthropic.com/v1/models", {
            headers: {
              "x-api-key": key,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
          });
          if (!resp.ok) throw new Error("Ongeldige API key");
          const data = await resp.json();
          const models = (data.data || [])
            .filter(m => m.id && !m.id.includes("claude-3-") && !m.id.includes("claude-2"))
            .sort((a, b) => b.id.localeCompare(a.id));

          if (models.length === 0) throw new Error("Geen modellen gevonden");

          const section = document.getElementById("model-section");
          section.style.display = "block";
          select.innerHTML = models.map(m =>
            `<option value="${escapeHtml(m.id)}"${m.id === DEFAULT_MODEL ? " selected" : ""}>${escapeHtml(m.display_name || m.id)}</option>`
          ).join("");

          btn.textContent = "Opslaan";
          btn.disabled = false;
        } catch (err) {
          btn.textContent = "Volgende";
          btn.disabled = false;
          alert(err.message);
        }
      };
    }

    // ── Spotify OAuth PKCE ───────────────────────────────────────────────────

    function generateCodeVerifier() {
      const arr = new Uint8Array(64);
      crypto.getRandomValues(arr);
      return btoa(String.fromCharCode(...arr))
        .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    }

    async function generateCodeChallenge(verifier) {
      const data = new TextEncoder().encode(verifier);
      const hash = await crypto.subtle.digest("SHA-256", data);
      return btoa(String.fromCharCode(...new Uint8Array(hash)))
        .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    }

    function renderLogin() {
      app.innerHTML = `
        <div class="card">
          <h1>LP Player</h1>
          <p>Log in op Spotify om muziek af te spelen.</p>
          <button id="spotify-login">Inloggen met Spotify</button>
        </div>
      `;
      document.getElementById("spotify-login").onclick = startSpotifyLogin;
    }

    async function startSpotifyLogin() {
      const verifier = generateCodeVerifier();
      sessionStorage.setItem("pkce_verifier", verifier);
      const challenge = await generateCodeChallenge(verifier);
      const params = new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        response_type: "code",
        redirect_uri: SPOTIFY_REDIRECT_URI,
        code_challenge: challenge,
        code_challenge_method: "S256",
        scope: SPOTIFY_SCOPES,
      });
      location.href = "https://accounts.spotify.com/authorize?" + params;
    }

    async function handleSpotifyCallback() {
      const params = new URLSearchParams(location.search);
      const code = params.get("code");
      if (!code) return;

      const verifier = sessionStorage.getItem("pkce_verifier");
      if (!verifier) return;

      const resp = await fetch("https://accounts.spotify.com/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
          grant_type: "authorization_code",
          code,
          redirect_uri: SPOTIFY_REDIRECT_URI,
          client_id: SPOTIFY_CLIENT_ID,
          code_verifier: verifier,
        }),
      });
      const data = await resp.json();
      if (data.access_token) {
        localStorage.setItem("spotify_access_token", data.access_token);
        localStorage.setItem("spotify_refresh_token", data.refresh_token);
        localStorage.setItem("spotify_expires_at", Date.now() + data.expires_in * 1000);
        sessionStorage.removeItem("pkce_verifier");
        history.replaceState({}, "", location.pathname);
      }
    }

    async function getSpotifyToken() {
      const expiresAt = parseInt(localStorage.getItem("spotify_expires_at") || "0");
      if (Date.now() < expiresAt - 60000) {
        return localStorage.getItem("spotify_access_token");
      }
      const refreshToken = localStorage.getItem("spotify_refresh_token");
      if (!refreshToken) { render(); return null; }

      const resp = await fetch("https://accounts.spotify.com/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
          grant_type: "refresh_token",
          refresh_token: refreshToken,
          client_id: SPOTIFY_CLIENT_ID,
        }),
      });
      const data = await resp.json();
      if (data.access_token) {
        localStorage.setItem("spotify_access_token", data.access_token);
        if (data.refresh_token) localStorage.setItem("spotify_refresh_token", data.refresh_token);
        localStorage.setItem("spotify_expires_at", Date.now() + data.expires_in * 1000);
        return data.access_token;
      }
      localStorage.removeItem("spotify_access_token");
      localStorage.removeItem("spotify_refresh_token");
      render();
      return null;
    }

    // ── Settings ─────────────────────────────────────────────────────────────

    async function fetchModels(apiKey) {
      const resp = await fetch("https://api.anthropic.com/v1/models", {
        headers: {
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
      });
      if (!resp.ok) return [];
      const data = await resp.json();
      return (data.data || [])
        .filter(m => m.id && !m.id.includes("claude-3-") && !m.id.includes("claude-2"))
        .sort((a, b) => b.id.localeCompare(a.id));
    }

    async function renderSettings() {
      const apiKey = localStorage.getItem("anthropic_key") || "";
      const currentModel = getModel();
      const token = await getSpotifyToken();

      let devicesHtml = '<p style="color:#b3b3b3; font-size:0.85rem;">Niet ingelogd op Spotify</p>';
      if (token) {
        const allDevices = await fetch("https://api.spotify.com/v1/me/player/devices", {
          headers: { Authorization: `Bearer ${token}` },
        }).then(r => r.json()).catch(() => ({ devices: [] }));
        const devices = allDevices.devices || [];
        const selectedDevice = localStorage.getItem("preferred_device") || "";
        if (devices.length > 0) {
          devicesHtml = devices.map(d => `
            <div class="device-item${d.id === selectedDevice || (!selectedDevice && d.is_active) ? " selected" : ""}" data-device-id="${d.id}">
              <div>
                <div class="device-name">${escapeHtml(d.name)}${d.is_restricted ? ' <span style="color:#e74c3c; font-size:0.7rem;">(restricted)</span>' : ""}</div>
                <div class="device-type">${escapeHtml(d.type)}</div>
              </div>
              ${d.id === selectedDevice || (!selectedDevice && d.is_active) ? '<span style="color:#1DB954;">&#10003;</span>' : ""}
            </div>
          `).join("");
        } else {
          devicesHtml = '<p style="color:#b3b3b3; font-size:0.85rem;">Geen devices gevonden. Open Spotify op een apparaat.</p>';
        }
      }

      const overlay = document.createElement("div");
      overlay.className = "settings-overlay";
      overlay.innerHTML = `
        <div style="width:min(90vw,400px); margin-bottom:1rem; display:flex; justify-content:space-between; align-items:center;">
          <h1 style="font-size:1.3rem;">Instellingen</h1>
          <button class="btn-sm btn-gray" id="settings-close" style="width:auto; padding:8px 16px;">Sluiten</button>
        </div>

        <div class="settings-card">
          <h2>Anthropic</h2>
          <input type="password" id="s-api-key" placeholder="sk-ant-..." value="${escapeHtml(apiKey)}">
          <select id="s-model"><option>Laden...</option></select>
        </div>

        <div class="settings-card">
          <h2>Spotify Device</h2>
          <div id="s-devices">${devicesHtml}</div>
          <button class="btn-sm btn-gray" id="s-refresh-devices" style="margin-top:0.5rem;">Devices vernieuwen</button>
        </div>

        <div class="settings-card">
          <h2>Spotify Account</h2>
          ${token
            ? '<button class="btn-sm btn-red" id="s-spotify-logout">Uitloggen</button>'
            : '<button class="btn-sm btn-green" id="s-spotify-login">Inloggen</button>'
          }
        </div>

        <button class="btn-sm btn-green" id="s-save" style="width:min(90vw,400px); padding:14px; border-radius:24px; margin-top:0.5rem;">Opslaan</button>
      `;
      document.body.appendChild(overlay);

      // Load models
      const models = await fetchModels(apiKey);
      const select = document.getElementById("s-model");
      if (models.length > 0) {
        select.innerHTML = models.map(m =>
          `<option value="${escapeHtml(m.id)}"${m.id === currentModel ? " selected" : ""}>${escapeHtml(m.display_name || m.id)}</option>`
        ).join("");
      } else {
        select.innerHTML = `<option value="${escapeHtml(currentModel)}">${escapeHtml(currentModel)}</option>`;
      }

      // Device selection
      overlay.querySelectorAll(".device-item").forEach(el => {
        el.onclick = () => {
          overlay.querySelectorAll(".device-item").forEach(d => {
            d.classList.remove("selected");
            d.querySelector("span")?.remove();
          });
          el.classList.add("selected");
          const check = document.createElement("span");
          check.style.color = "#1DB954";
          check.innerHTML = "&#10003;";
          el.appendChild(check);
        };
      });

      document.getElementById("s-refresh-devices").onclick = async () => {
        overlay.remove();
        await renderSettings();
      };

      if (document.getElementById("s-spotify-logout")) {
        document.getElementById("s-spotify-logout").onclick = () => {
          localStorage.removeItem("spotify_access_token");
          localStorage.removeItem("spotify_refresh_token");
          localStorage.removeItem("spotify_expires_at");
          localStorage.removeItem("preferred_device");
          overlay.remove();
          render();
        };
      }
      if (document.getElementById("s-spotify-login")) {
        document.getElementById("s-spotify-login").onclick = () => {
          overlay.remove();
          startSpotifyLogin();
        };
      }

      document.getElementById("s-save").onclick = () => {
        const newKey = document.getElementById("s-api-key").value.trim();
        if (newKey && newKey.startsWith("sk-ant-")) {
          localStorage.setItem("anthropic_key", newKey);
        }
        localStorage.setItem("anthropic_model", document.getElementById("s-model").value);
        const selectedDevice = overlay.querySelector(".device-item.selected");
        if (selectedDevice) {
          localStorage.setItem("preferred_device", selectedDevice.dataset.deviceId);
        }
        overlay.remove();
      };

      document.getElementById("settings-close").onclick = () => overlay.remove();
    }

    function getPreferredDevice(devices) {
      const preferred = localStorage.getItem("preferred_device");
      if (preferred) {
        const found = devices.find(d => d.id === preferred);
        if (found) return found;
      }
      return devices.find(d => d.is_active) || devices[0];
    }

    // ── Playback Controls ───────────────────────────────────────────────────

    let isPlaying = true;

    async function togglePlayback() {
      const token = await getSpotifyToken();
      if (!token) return;
      const endpoint = isPlaying ? "pause" : "play";
      try {
        const devices = await getDevices(token);
        const device = getPreferredDevice(devices);
        const url = device
          ? `https://api.spotify.com/v1/me/player/${endpoint}?device_id=${device.id}`
          : `https://api.spotify.com/v1/me/player/${endpoint}`;
        await fetch(url, { method: "PUT", headers: { Authorization: `Bearer ${token}` } });
        isPlaying = !isPlaying;
        updatePlayPauseBtn();
      } catch (err) {
        document.getElementById("status").innerHTML = `<span class="error">${escapeHtml(err.message)}</span>`;
      }
    }

    function updatePlayPauseBtn() {
      const btn = document.getElementById("play-pause-btn");
      if (!btn) return;
      btn.innerHTML = isPlaying
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>';
    }

    // ── Camera Screen ────────────────────────────────────────────────────────

    function renderCamera() {
      app.innerHTML = `
        <button class="settings-btn" id="open-settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
        <div class="camera-screen">
          <h1>LP Player</h1>
          <div id="main-capture">
            <label class="capture-btn" for="photo">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
              <span>Neem foto</span>
            </label>
            <input type="file" id="photo" accept="image/*" capture="environment" hidden>
          </div>
          <div id="status" class="status"></div>
          <div id="result" class="result"></div>
        </div>
      `;
      document.getElementById("photo").onchange = handlePhoto;
      document.getElementById("open-settings").onclick = renderSettings;
    }

    // ── Photo Handler + Image Resize ─────────────────────────────────────────

    async function handlePhoto(event) {
      const file = event.target.files[0];
      if (!file) return;

      const status = document.getElementById("status");
      const result = document.getElementById("result");
      status.textContent = "Album herkennen...";
      result.innerHTML = "";
      // Verberg de grote camera knop tijdens verwerking
      const mainCapture = document.getElementById("main-capture");
      if (mainCapture) mainCapture.style.display = "none";

      try {
        const base64 = await resizeAndEncode(file, 800);
        const album = await identifyAlbum(base64);
        if (!album) {
          status.innerHTML = '<span class="error">Album niet herkend. Probeer opnieuw.</span>';
          return;
        }
        status.textContent = `${album.name} — ${album.artist}. Afspelen...`;
        await searchAndPlay(album.name, album.artist);
      } catch (err) {
        status.innerHTML = `<span class="error">${err.message}</span>`;
        const mainCapture = document.getElementById("main-capture");
        if (mainCapture) mainCapture.style.display = "";
      }
      event.target.value = "";
    }

    function resizeAndEncode(file, maxWidth) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          const canvas = document.createElement("canvas");
          const scale = Math.min(1, maxWidth / img.width);
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);
          resolve(canvas.toDataURL("image/jpeg", 0.8).split(",")[1]);
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("Afbeelding kon niet worden geladen"));
        };
        img.src = url;
      });
    }

    // ── Anthropic API — Album Identification ─────────────────────────────────

    async function identifyAlbum(base64Image) {
      const apiKey = localStorage.getItem("anthropic_key");
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
          "content-type": "application/json",
        },
        body: JSON.stringify({
          model: getModel(),
          max_tokens: 200,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: "image/jpeg", data: base64Image },
              },
              {
                type: "text",
                text: 'Identify the album and artist from this image. Reply ONLY with JSON: {"name": "album name", "artist": "artist name"}. If you cannot identify it, reply: {"name": null, "artist": null}',
              },
            ],
          }],
        }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        const msg = data.error?.message || `API fout ${resp.status}`;
        throw new Error(msg);
      }
      const text = data.content?.[0]?.text || "";
      try {
        const parsed = JSON.parse(text);
        if (!parsed.name) return null;
        return parsed;
      } catch {
        const match = text.match(/\{[^}]+\}/);
        if (match) {
          const parsed = JSON.parse(match[0]);
          return parsed.name ? parsed : null;
        }
        return null;
      }
    }

    // ── Spotify Search + Play + Tracklist ────────────────────────────────────

    async function getDevices(token) {
      const resp = await fetch("https://api.spotify.com/v1/me/player/devices", {
        headers: { Authorization: `Bearer ${token}` },
      });
      const data = await resp.json();
      return (data.devices || []).filter(d => !d.is_restricted);
    }

    async function playOnDevice(token, body, deviceId) {
      const url = deviceId
        ? `https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`
        : "https://api.spotify.com/v1/me/player/play";
      const resp = await fetch(url, {
        method: "PUT",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify(body),
      });
      if (!resp.ok && resp.status !== 204) {
        const errData = await resp.json().catch(() => ({}));
        if (resp.status === 404) {
          throw new Error("Geen actief Spotify device. Open Spotify op een apparaat.");
        }
        throw new Error(errData.error?.message || `Spotify fout ${resp.status}`);
      }
    }

    async function searchAndPlay(albumName, artist) {
      const token = await getSpotifyToken();
      if (!token) throw new Error("Spotify niet verbonden");

      const query = encodeURIComponent(`${albumName} artist:${artist}`);
      const searchResp = await fetch(
        `https://api.spotify.com/v1/search?q=${query}&type=album&limit=1`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      const searchData = await searchResp.json();
      const album = searchData.albums?.items?.[0];
      if (!album) throw new Error("Album niet gevonden op Spotify");

      // Haal devices op en kies preferred/actief/eerste device
      const devices = await getDevices(token);
      if (devices.length === 0) {
        throw new Error("Geen beschikbaar Spotify device. Open Spotify op een apparaat.");
      }
      const device = getPreferredDevice(devices);
      await playOnDevice(token, { context_uri: album.uri }, device.id);
      isPlaying = true;

      const tracksResp = await fetch(
        `https://api.spotify.com/v1/albums/${album.id}/tracks?limit=50`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      const tracksData = await tracksResp.json();
      const tracks = tracksData.items || [];

      const result = document.getElementById("result");
      const status = document.getElementById("status");
      const img = album.images?.[1]?.url || album.images?.[0]?.url || "";
      const spotifyUrl = album.external_urls?.spotify || "";
      status.textContent = "";
      result.innerHTML = `
        <label class="scan-btn" for="photo-new">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          Andere plaat
        </label>
        <input type="file" id="photo-new" accept="image/*" capture="environment" hidden>
        <div class="album-card">
          ${img ? `<a href="${spotifyUrl}" target="_blank" rel="noopener"><img src="${img}" alt="" style="cursor:pointer;"></a>` : ""}
          <div class="info" style="flex:1;">
            <a href="${spotifyUrl}" target="_blank" rel="noopener" style="color:inherit; text-decoration:none;">
              <h2>${escapeHtml(album.name)}</h2>
            </a>
            <p>${album.artists.map(a => escapeHtml(a.name)).join(", ")}</p>
            <p class="playing">Nu aan het spelen</p>
          </div>
          <button class="play-pause" id="play-pause-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
        </div>
        <ul class="tracklist">
          ${tracks.map((t, i) => `
            <li class="track${i === 0 ? " active" : ""}" data-uri="${t.uri}" data-album-uri="${album.uri}" data-offset="${i}">
              <span class="track-nr">${t.track_number}</span>
              <span class="track-name">${escapeHtml(t.name)}</span>
              <span class="track-dur">${formatDuration(t.duration_ms)}</span>
            </li>
          `).join("")}
        </ul>
      `;

      document.getElementById("play-pause-btn").onclick = togglePlayback;

      result.querySelectorAll(".track").forEach(el => {
        el.onclick = () => playTrack(el.dataset.albumUri, parseInt(el.dataset.offset), el);
      });

      document.getElementById("photo-new").onchange = handlePhoto;
    }

    function formatDuration(ms) {
      const min = Math.floor(ms / 60000);
      const sec = Math.floor((ms % 60000) / 1000);
      return `${min}:${sec.toString().padStart(2, "0")}`;
    }

    async function playTrack(albumUri, offset, el) {
      const token = await getSpotifyToken();
      if (!token) return;

      try {
        const devices = await getDevices(token);
        const device = getPreferredDevice(devices);
        if (!device) throw new Error("Geen beschikbaar Spotify device.");
        await playOnDevice(token, { context_uri: albumUri, offset: { position: offset } }, device.id);
        document.querySelectorAll(".track.active").forEach(t => t.classList.remove("active"));
        el.classList.add("active");
        isPlaying = true;
        updatePlayPauseBtn();
      } catch (err) {
        document.getElementById("status").innerHTML = `<span class="error">${escapeHtml(err.message)}</span>`;
      }
    }

    // ── App Init ─────────────────────────────────────────────────────────────

    handleSpotifyCallback().then(render);
  </script>
</body>
</html>
